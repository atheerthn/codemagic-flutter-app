workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    environment:
      flutter: stable
      java: 17
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.gradle/caches
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Analyze code
        script: flutter analyze --no-fatal-infos
      - name: Check formatting
        script: dart format --set-exit-if-changed .
      - name: Run tests
        script: flutter test --coverage
      - name: Build APK
        script: flutter build apk --debug
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/mapping.txt
      - coverage/lcov.info
    publishing:
      email:
        recipients:
          - atheerthn@users.noreply.github.com
        notify:
          success: true
          failure: true

  ios-workflow:
    name: iOS Build
    max_build_duration: 90
    instance_type: mac_mini_m1
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - ios/Pods
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Analyze code
        script: flutter analyze --no-fatal-infos
      - name: Run tests
        script: flutter test
      - name: Build iOS (no codesign)
        script: flutter build ios --debug --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
    publishing:
      email:
        recipients:
          - atheerthn@users.noreply.github.com
        notify:
          success: true
          failure: true

  release-android:
    name: Android Release
    max_build_duration: 60
    instance_type: mac_mini_m1
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: v*
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Run tests
        script: flutter test
      - name: Build release APK
        script: flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - atheerthn@users.noreply.github.com
        notify:
          success: true
          failure: true
